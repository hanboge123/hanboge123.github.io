<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>图标</title>
    <style>
        *{
            margin: 0;
            padding: 0;
        }
        .color{
            min-height: 100vh;
            margin: 0;
            background-image: linear-gradient(180deg,rgb(28, 179, 225) 10%,rgb(149, 66, 209) 50%,rgb(43, 43, 219));
        }
        .title{
            height: 450px;
            width: 500px;
            background-image: linear-gradient(145deg,rgb(117, 28, 212),rgb(185, 72, 157));
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%,-50%);
            border-radius: 8%;
        }
        .li{
            height: 280px;
            width: 400px;
            background-image: linear-gradient(rgb(6, 1, 11));
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%,-50%);
            border-radius: 8%;

        }
        div > img{
            width: 300px;
            height: 200px;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%,-50%);
        }
    </style>
</head>
<body>
    <div class="color">
        <div class="title">
            <div class="li">
                <div class="tu">
                    <img src="tubiao.JPG" alt="">

                </div>

            </div>

        </div>

    </div>
    
</body>
</html>
