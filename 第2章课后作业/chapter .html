<!DOCTYPE html>
<html lang="zh-CN">
    <head>
    <meta charset="UTF-8">
    <title>第2章课后作业</title>
    <style>
     * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        }
        body {
            background-color: #fff;
            font-family: "Microsoft Yahei", sans-serif;
            padding: 30px;
            }
            /* 标题样式 */.title {font-family: 'Times New Roman', Times, serif;
                padding-left: 620px;
                font-size: 30px;
                font-weight: bold;
                margin-bottom: 20px;
                }
                .title span {font-family: 'Times New Roman', Times, serif;
                    color: #0066cc; /* 标题中“认真严谨”四个字为蓝色 */}
                    /* 时间来源信息 */
                    .meta {
                        padding-left: 660px;
                        font-size: 12px;
                        color: #555;
                        margin-bottom: 8px;
                        }
                        .meta span {
                            color: #0066cc;
                            }
                            /* 主体内容布局：图片+文字 */
                            .content {
                                display: flex;
                                align-items: center;
                                gap: 40px;
                                max-width: 1200px;
                                margin: 0 auto;
                                }
                                /* 左侧图片 */
                                .img-box {
                                    flex: 0 0 400px;
                                    }
                                    .img-box img {
                                        width: 100%;
                                        display: block;
                                        }
                                        /* 右侧文字列表 */
                                        .text-box {
                                            flex: 1;
                                            font-size: 12px;
                                            line-height: 2;
                                            }
                                            .text-box ul {
                                                list-style: none;
                                                }
                                                .text-box li::before {
                                    content: "<span class="emoji emoji2660"></span>";
                                    color: black;
                                    margin-right: 10px;
                                    }
                                    /* 高亮红色文字 */
                                    .red-text {
                                        color: red;
                                        }
                                        </style>
                                        </head>
                                        <body>
                                        <h1 class="title">如何培养<span>认真严谨</span>的习惯</h1>
                                        <div class="meta">
                                        时间:<span>2022年02月21日17时26分</span>&nbsp;&nbsp;来源:<span>思政教育</span>
                                    </div>
                                    <div class="content">
                                        <!-- 左侧图片 -->
                                         <div class="img-box">
                                            <img src="attitude.jpg" alt="态度决定一切 细节决定成败">
                                        </div>
                                        <!-- 右侧文字内容 -->
                                         <div class="text-box">
                                            <ul>
                                                <li>♠<span class="red-text">反复确认，</span>做任何事情都要照顾到每一个细节并反复确认，<span class="red-text">要有一种能在脑子里‘虚拟’整个事件过程的能力，</span>确保所有的节点都正常。</li>
                                                <li>♠<span class="red-text">想尽办法努力让不可能变为可能</span>只有用尽全力做了，才算是努力</li>
                                                <li>♠<span class="red-text">结果导向一切以结果为导向，任何事情都是你的名片。</span>还要思考你的结果和过程是否满足所有和你配合的人的需求，</li>
                                                <li>♠<span class="red-text">学会假设了解周围比你强的人，观察他们的做事方法。</span>遇到让自己束手无策的时候，把自己虚拟成他的样子，想想他会怎么做</li>
                                            </ul>
                                        </div>
                                    </div>
                                </body>
                                </html>
